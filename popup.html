<!DOCTYPE html><html><head><meta charset="UTF-8"><title>TF4t Tweak</title><style>*{box-sizing:border-box;margin:0;padding:0}body{width:300px;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background-color:#f9fafb;color:#1f2937;user-select:none}.header{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:18px 20px;text-align:center;border-bottom-left-radius:16px;border-bottom-right-radius:16px;box-shadow:0 4px 10px -2px rgba(99,102,241,.3);margin-bottom:20px}.header h1{font-size:20px;font-weight:700;letter-spacing:.5px;margin:0}.container{padding:0 20px 15px}.option-group{background:#fff;border-radius:10px;padding:15px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,.02);border:1px solid #f3f4f6}.title{font-size:11px;text-transform:uppercase;color:#9ca3af;font-weight:700;margin-bottom:12px;display:block;letter-spacing:.08em}.select-wrapper{position:relative}select{width:100%;padding:10px 12px;font-size:14px;border:1px solid #e5e7eb;border-radius:8px;background-color:#f9fafb;cursor:pointer;outline:0;appearance:none;font-weight:500;color:#374151;transition:all .2s}select:hover{border-color:#d1d5db}select:focus{border-color:#6366f1;background-color:#fff;box-shadow:0 0 0 3px rgba(99,102,241,.1)}.select-arrow{position:absolute;top:50%;right:14px;transform:translateY(-50%);pointer-events:none;font-size:10px;color:#9ca3af}.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;cursor:pointer}.toggle-row:last-child{margin-bottom:0}.toggle-label{font-size:14px;font-weight:500;color:#374151}.switch{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#e5e7eb;transition:.3s;border-radius:34px}.slider:before{position:absolute;content:"";height:18px;width:18px;left:3px;bottom:3px;background-color:#fff;transition:.3s cubic-bezier(.4,0,.2,1);border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.1)}input:checked+.slider{background-color:#6366f1}input:checked+.slider:before{transform:translateX(20px)}.footer{text-align:center;font-size:11px;color:#9ca3af;margin-top:20px;padding-top:15px;border-top:1px dashed #e5e7eb}.copyright{display:inline-block;margin-top:4px}.author-name{color:#6366f1;font-weight:700}</style></head><body><div class="header"><h1>TF4t Tweak</h1></div><div class="container"><div class="option-group"><span class="title" id="lbl-language">Language</span><div class="select-wrapper"><select id="lang-select"><option value="vi">Tiếng Việt</option><option value="en">English</option></select><span class="select-arrow">▼</span></div></div><div class="option-group"><span class="title" id="lbl-features">Features</span><label class="toggle-row"><span class="toggle-label" id="lbl-remove-blur">Remove Blur Images</span><div class="switch"><input type="checkbox" id="chk-remove-blur"><span class="slider"></span></div></label><label class="toggle-row"><span class="toggle-label" id="lbl-context-menu">Full Avatar Menu</span><div class="switch"><input type="checkbox" id="chk-context-menu"><span class="slider"></span></div></label></div><div class="footer"><div>Developed with ❤️</div><div class="copyright">&copy; 2026<span class="author-name">Hoàng Minh Tâm</span></div></div></div><script src="popup.js"></script></body></html>
