<!doctype html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{width:340px;font-family:"Segoe UI",sans-serif;background-color:#f9fafb;color:#1f2937;padding-bottom:10px}.header{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:15px;text-align:center;border-radius:0 0 12px 12px;margin-bottom:15px}.header h1{font-size:18px;font-weight:700;margin:0}.container{padding:0 15px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:12px;margin-bottom:12px}.card-title{font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:8px;display:block}.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;font-size:13px;font-weight:500}.list-scroll{max-height:150px;overflow-y:auto;margin-bottom:5px}.list-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #f3f4f6}.list-item:last-child{border-bottom:none}.item-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}.item-sub{font-size:11px;color:#9ca3af}.btn-go{background:#dcfce7;color:#166534;border:none;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}.btn-go:hover{background:#bbf7d0}.btn-apply{background:#e0f2fe;color:#0369a1;border:none;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}.btn-apply:hover{background:#bae6fd}.btn-settings{width:100%;padding:8px;background:#e0e7ff;color:#4338ca;border:none;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px}.btn-settings:hover{background:#c7d2fe}.empty-msg{text-align:center;font-size:12px;color:#9ca3af;padding:10px}select{padding:4px;border:1px solid #d1d5db;border-radius:4px;font-size:12px;outline:0;background:#fff}.tab-nav{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:10px}.tab-btn{flex:1;padding:8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;color:#6b7280;border-bottom:2px solid transparent}.tab-btn.active{color:#6366f1;border-bottom-color:#6366f1}.tab-content{display:none}.tab-content.active{display:block}</style></head><body><div class="header"><h1>TF4t Tweak</h1></div><div class="container"><div class="card"><div class="row"><span data-i18n="lblLang">Language</span><select id="ui-lang"><option value="vi">Tiếng Việt</option><option value="en">English</option></select></div><div class="row"><span data-i18n="lblBlur">Remove Blur</span><input type="checkbox" id="chk-blur"></div><div class="row"><span data-i18n="lblMenu">Context Menu</span><input type="checkbox" id="chk-menu"></div><div class="row"><span data-i18n="enableInviChat">Enable Invisible Chat</span><input type="checkbox" id="enableInviChat"></div></div><div class="card" style="padding:0;overflow:hidden"><div class="tab-nav"><div class="tab-btn active" data-tab="create" data-i18n="tabCreate">Create Room</div><div class="tab-btn" data-tab="config" data-i18n="tabConfig">Room Config</div></div><div id="create" class="tab-content active" style="padding:12px"><div id="room-list" class="list-scroll"></div><div id="empty-create" class="empty-msg" style="display:none" data-i18n="lblEmpty">No presets found.</div></div><div id="config" class="tab-content" style="padding:12px"><div id="config-list" class="list-scroll"></div><div id="empty-config" class="empty-msg" style="display:none" data-i18n="lblEmpty">No presets found.</div></div></div><button class="btn-settings" id="btn-open-options" data-i18n="btnManage">Manage</button></div><script src="popup.js"></script></body></html>
